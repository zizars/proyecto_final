name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build imagen Docker
        run: docker build -t ${{ secrets.DOCKER_USER }}/hola-devops .

      - name: Push a Docker Hub
        run: docker push ${{ secrets.DOCKER_USER }}/hola-devops

      - name: Deploy en Render
        run: curl -X POST ${{ secrets.RENDER_WEBHOOK }}
